<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="tunnel_detail.title">Tunnel Details</title>
    <link href="/static/vendor/fonts/material-icons.css" rel="stylesheet">
    <link href="/static/vendor/fonts/roboto.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/themes.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/tunnel-detail.css">
    <link rel="stylesheet" href="/static/tooltip.css">
    <link rel="stylesheet" href="/static/vendor/xterm/xterm.css">
    <link rel="stylesheet" href="/static/terminal.css">

    <script>
        window.PROJECT_CONFIG = {
            dockerHubUrl: 'https://hub.docker.com/r/oaklight/autossh-tunnel',
            githubUrl: 'https://github.com/Oaklight/autossh-tunnel-dockerized',
            projectName: 'SSH Tunnel Manager'
        };
    </script>

    <script src="/static/theme-switcher.js"></script>
</head>

<body data-page-title="tunnel_detail.title">
    <!-- Header -->
    <header class="site-header">
        <div class="header-left">
            <a href="/" class="header-back">
                <i class="material-icons">arrow_back</i>
            </a>
            <span class="header-title" data-i18n="tunnel_detail.title">Tunnel Details</span>
        </div>
        <div class="header-right">
            <button class="header-icon theme-toggle" id="themeToggle" data-i18n-tooltip="navigation.theme">
                <i class="material-icons">light_mode</i>
            </button>
            <div class="scheme-wrapper">
                <button class="header-icon scheme-toggle" id="schemeToggle"
                        data-i18n-tooltip="navigation.color_scheme">
                    <i class="material-icons">palette</i>
                </button>
                <div class="scheme-dropdown" id="schemeDropdown"></div>
            </div>
            <div class="lang-wrapper">
                <button class="header-icon language-toggle" id="languageToggle" data-tooltip="dynamic">
                    <i class="material-icons">language</i>
                </button>
                <div class="language-dropdown" id="languageDropdown"></div>
            </div>
            <a href="#" id="dockerhub-link" target="_blank" class="header-icon"
                data-i18n-tooltip="navigation.docker_hub">

                        d="M13.983 11.078h2.119a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.119a.186.186 0 00-.186.186v1.887c0 .102.084.185.186.185m-2.954-5.43h2.118a.186.186 0 00.186-.186V3.574a.186.186 0 00-.186-.185h-2.118a.186.186 0 00-.186.185v1.888c0 .102.084.185.186.185m0 2.716h2.118a.186.186 0 00.186-.186V6.29a.186.186 0 00-.186-.185h-2.118a.186.186 0 00-.186.185v1.887c0 .102.084.186.186.186m-2.93 0h2.12a.186.186 0 00.185-.186V6.29a.186.186 0 00-.185-.185H8.1a.186.186 0 00-.186.185v1.887c0 .102.084.186.186.186m-2.964 0h2.119a.186.186 0 00.186-.186V6.29a.186.186 0 00-.186-.185H5.136a.186.186 0 00-.186.185v1.887c0 .102.084.186.186.186m5.893 2.715h2.118a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.118a.186.186 0 00-.186.186v1.887c0 .102.084.185.186.185m-2.93 0h2.12a.186.186 0 00.185-.185V9.006a.186.186 0 00-.185-.186H8.1a.186.186 0 00-.186.186v1.887c0 .102.084.185.186.185m-2.964 0h2.119a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186H5.136a.186.186 0 00-.186.186v1.887c0 .102.084.185.186.185M23.763 9.89c-.065-.051-.672-.51-1.954-.51-.338 0-.676.03-1.01.087-.248-1.7-1.653-2.53-1.716-2.566l-.344-.199-.226.327c-.284.438-.49.922-.612 1.43-.23.97-.09 1.882.403 2.661-.595.332-1.55.413-1.744.42H.751a.751.751 0 00-.75.748 11.376 11.376 0 00.692 4.062c.545 1.428 1.355 2.48 2.41 3.124 1.18.723 3.1 1.137 5.275 1.137.983 0 1.97-.084 2.943-.25 1.225-.208 2.42-.598 3.554-1.146 1.147-.563 2.215-1.291 3.168-2.168.814-.75 1.518-1.607 2.05-2.553.404-.719.71-1.482.918-2.273a4.4 4.4 0 001.372.22c1.109 0 2.179-.536 2.717-1.36.189-.292.33-.609.415-.943l.034-.14-.079-.106z" />
                </svg>
            </a>
            <a href="#" id="github-link" target="_blank" class="header-icon"
                data-i18n-tooltip="navigation.github">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <!-- Tunnel Configuration Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="material-icons">settings</i>
                        <span data-i18n="tunnel_detail.configuration">Configuration</span>
                    </h2>
                    <button class="btn btn-primary save-config-btn" id="saveConfigBtn">
                        <i class="material-icons">save</i>
                        <span data-i18n="buttons.save_restart">Save & Restart</span>
                    </button>
                </div>
                <div class="card-content">
                    <div class="config-grid">
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.name">Name</label>
                            <input type="text" class="config-input" id="tunnelName" placeholder="Tunnel name"
                                data-i18n-placeholder="table.placeholders.tunnel_name">
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.hash">Hash</label>
                            <div class="config-value hash-value" id="tunnelHash">
                                <span class="hash-text">-</span>
                                <button class="hash-copy-btn" id="copyHashBtn" title="Copy hash"
                                    data-i18n-title="buttons.copy_hash">
                                    <i class="material-icons">content_copy</i>
                                </button>
                            </div>
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.remote_host">Remote Host</label>
                            <input type="text" class="config-input" id="remoteHost" placeholder="Remote host"
                                data-i18n-placeholder="table.placeholders.remote_host">
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.remote_port">Remote Port</label>
                            <input type="text" class="config-input" id="remotePort"
                                placeholder="Remote port (e.g., 44497 or hostname:44497)"
                                data-i18n-placeholder="table.placeholders.remote_port">
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.local_port">Local Port</label>
                            <input type="text" class="config-input" id="localPort"
                                placeholder="Local port (e.g., 55001 or 192.168.1.100:55001)"
                                data-i18n-placeholder="table.placeholders.local_port">
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.direction">Direction</label>
                            <select class="config-select" id="direction">
                                <option value="remote_to_local" data-i18n="table.direction.remote_to_local">Remote to
                                    Local</option>
                                <option value="local_to_remote" data-i18n="table.direction.local_to_remote">Local to
                                    Remote</option>
                            </select>
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.interactive">Interactive Auth</label>
                            <button class="detail-interactive-toggle" id="interactiveToggle" data-interactive="false">
                                <i class="material-icons">fingerprint</i>
                                <span class="toggle-label" data-i18n="buttons.interactive_auth_disabled">Disabled</span>
                            </button>
                        </div>
                        <div class="config-item">
                            <label data-i18n="tunnel_detail.status">Status</label>
                            <div class="config-value" id="statusValue">
                                <i class="material-icons" style="color: var(--warning);">hourglass_empty</i>
                                <span style="color: var(--warning);" data-i18n="table.status.loading">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Control Buttons Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="material-icons">control_camera</i>
                        <span data-i18n="tunnel_detail.controls">Controls</span>
                    </h2>
                </div>
                <div class="card-content">
                    <div class="control-buttons">
                        <button class="control-btn start-btn" id="startBtn">
                            <i class="material-icons">play_arrow</i>
                            <span data-i18n="buttons.start_tunnel">Start</span>
                        </button>
                        <button class="control-btn restart-btn" id="restartBtn">
                            <i class="material-icons">refresh</i>
                            <span data-i18n="buttons.restart_tunnel">Restart</span>
                        </button>
                        <button class="control-btn stop-btn" id="stopBtn">
                            <i class="material-icons">stop</i>
                            <span data-i18n="buttons.stop_tunnel">Stop</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Logs Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="material-icons">description</i>
                        <span data-i18n="tunnel_detail.logs">Logs</span>
                    </h2>
                    <div class="log-controls">
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoRefresh">
                            <span class="toggle-switch-label" data-i18n="buttons.auto_refresh">Auto Refresh</span>
                        </label>
                        <button class="icon-button" id="refreshLogsBtn" title="Refresh logs"
                            data-i18n-title="buttons.refresh_logs">
                            <i class="material-icons">refresh</i>
                        </button>
                        <button class="icon-button" id="clearLogsBtn" title="Clear display"
                            data-i18n-title="buttons.clear_logs">
                            <i class="material-icons">clear_all</i>
                        </button>
                    </div>
                </div>
                <div class="card-content">
                    <div class="log-box" id="logBox">
                        <div class="log-placeholder">
                            <i class="material-icons">info</i>
                            <p data-i18n="tunnel_detail.no_logs">No logs available yet. Start the tunnel to see logs.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/static/vendor/xterm/xterm.js"></script>
    <script src="/static/vendor/xterm/xterm-addon-fit.js"></script>
    <script src="/static/terminal.js?v=3"></script>
    <script src="/static/i18n.js?v=3"></script>
    <script src="/static/tooltip.js?v=3"></script>
    <script src="/static/tunnel-detail.js?v=3"></script>
</body>

</html>

services:
  autossh:
    build: .
    volumes:
      - ~/.ssh:/home/myuser/.ssh:ro
      - ./config:/etc/autossh/config:rw
    environment:
      - PUID=1000
      - PGID=1000
      - AUTOSSH_GATETIME=0
      - API_ENABLE=true
      - API_PORT=8080
      - WS_PORT=8022
      - CONFIG_FILE=/etc/autossh/config/config.yaml
      - CONFIG_BACKUP_DIR=/etc/autossh/config/backups
    network_mode: "host"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5000:5000"
    # No config volume needed - web panel uses Config API from autossh container
    environment:
      - TZ=Asia/Shanghai
      # API_BASE_URL is used by the web server to proxy API requests to the autossh backend
      # This is a server-side URL, not accessed by the browser directly
      - API_BASE_URL=http://localhost:8080
      # WS_BASE_URL is used by the web server to proxy WebSocket connections
      # for interactive authentication sessions
      - WS_BASE_URL=ws://localhost:8022
